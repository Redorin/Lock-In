services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
      args:
        user: campusims
        uid: 1000
    image: campusims-app
    restart: unless-stopped
    working_dir: /var/www
    volumes:
      - ./:/var/www
    networks:
      - campusims-network

  web:
    image: nginx:alpine
    restart: unless-stopped
    ports:
      - "8082:80"
    volumes:
      - ./:/var/www
      - ./docker/nginx/default.conf:/etc/nginx/conf.d/default.conf
    networks:
      - campusims-network
    depends_on:
      - app

  db:
    image: mysql:8.0
    restart: unless-stopped
    environment:
      MYSQL_DATABASE: ${DB_DATABASE:-campus_ims}
      MYSQL_ROOT_PASSWORD: ${DB_PASSWORD:-secret}
      MYSQL_PASSWORD: ${DB_PASSWORD:-secret}
      MYSQL_USER: ${DB_USERNAME:-campusims}
    volumes:
      - dbdata:/var/lib/mysql
    networks:
      - campusims-network

networks:
  campusims-network:
    driver: bridge

volumes:
  dbdata:
